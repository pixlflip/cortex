# Cortex configuration — copy to cortex.yaml and edit.
#
# This file is PUBLIC-SAFE: it holds structure, never secrets. Tokens and API
# keys are read from environment variables referenced by name (token_env /
# api_key_env). Any "${ENV_VAR}" below is interpolated from the environment.
#
# As shipped, this runs locally over stdio with no API key required:
# local-only vault, git audit on, LLM disabled (deterministic tools only).

vault:
  # Path to your Obsidian vault (relative paths resolve against this file's dir).
  path: ./vault
  git:
    enabled: true              # git audit trail + rollback
    actor_name: cortex
    actor_email: cortex@localhost

# One private Obsidian vault per user. The existing vault.path above remains
# the main/shared vault; groups grant scoped access into it.
vaults:
  root: ./data/vaults
  index_dir: ./data/indexes
  archive_dir: ./data/archive
  # template_dir: ./vault-template   # optional seed copied on first provision
  auto_provision: true
  sync:
    adapter: none
  # Optional per-user exceptions inherit nothing from the default above:
  # sync_overrides:
  #   alice:
  #     adapter: s3
  #     options: { bucket: alice-notes, prefix: cortex/ }

sync:
  adapter: none                # none (default) | git | nextcloud | s3
  # Examples for when you opt in:
  # adapter: git
  # options: { remote: origin, branch: main }

# Identities that may connect. Each maps a credential to one principal and a set
# of scopes (globs over vault-relative paths). A non-matching path is invisible.
principals:
  - name: local
    scopes: ["**"]             # everything; tighten per principal as needed
    # token_env: CORTEX_TOKEN_LOCAL   # required only for http transport
    # write_scopes narrows where this principal may *mutate* (write_note,
    # patch_note, append_note, update_frontmatter, delete_note), independent
    # of what it can read. Only relevant when writes.enabled: true below.
    # Unset (the default) => writes fall back to this principal's read
    # `scopes` above, so writes work immediately with no extra config.
    # Set it to narrow the writable area further than what's readable, e.g.:
    # write_scopes: ["Inbox/**", "Daily/**"]

  # Example of a scoped remote agent (uncomment + set the env var to use):
  # - name: web-assistant
  #   scopes: ["Public/**", "Projects/Shared/**"]
  #   token_env: CORTEX_TOKEN_WEB_ASSISTANT

auth:
  enabled: true
  # Principal used for local stdio connections (which carry no token).
  local_principal: local
  # Run a full OAuth 2.1 authorization server (http transport only) so the
  # one-click connector UIs in Claude.ai / ChatGPT / Grok can authorize. The
  # browser is sent to a Cortex consent page where the user pastes their
  # principal token; the issued OAuth token is bound to that principal. Static
  # bearer tokens keep working too. Requires a correct public_url.
  oauth_enabled: false

admin:
  enabled: true
  # v1 compatibility/import source. `cortex migrate` imports this file into
  # SQLite; the v2 same-origin SPA then manages users, vaults, and the gateway.
  path: ./cortex.admin.json

database:
  # SQLite identity/gateway database (v2): users, groups, sessions, API
  # tokens, MCP server registry, tool permissions, tool-call audit. Created
  # by `cortex db init`. Stores salted hashes only — never plaintext secrets,
  # never note content. Keep it local and out of git (gitignored by default).
  # Relative paths resolve next to this file.
  path: ./data/cortex.sqlite

index:
  # SQLite FTS5/BM25 ranked search over the vault, used by `search`,
  # `context_pack`, and `semantic_search`. Built/refreshed by `cortex index`
  # and `cortex sync`, and lazily kept fresh on each query. Falls back to
  # plain substring search transparently if FTS5 isn't available locally.
  enabled: true
  # A rebuildable cache derived from the vault — never commit this; keep it
  # out of git (gitignored by default). Relative paths resolve next to this
  # file. Delete it any time; the next `cortex index`/`cortex sync` rebuilds it.
  path: ./cortex.index.sqlite
  # Target size (characters) for each indexed chunk, and how much trailing
  # context (characters) carries forward across a chunk boundary so a
  # relevant phrase is never severed mid-sentence.
  chunk_chars: 1500
  overlap: 150

server:
  transport: stdio             # stdio (local) | http (remote, Streamable HTTP)
  host: 127.0.0.1
  port: 8765
  # --- http transport only (remote MCP clients) ---
  path: /mcp                   # Streamable HTTP endpoint path
  # Externally-visible HTTPS URL (terminate TLS at a reverse proxy in front):
  # public_url: https://cortex.example.com
  # DNS-rebinding protection — list the hosts/origins allowed to call directly.
  # Leave empty when behind a trusted reverse proxy. Example:
  # allowed_origins: ["https://claude.ai", "https://chatgpt.com"]
  #
  # http transport requires at least one principal with a token_env (below), and
  # the bearer token maps to that principal. NOTE: programmatic clients and the
  # Anthropic API mcp_servers connector accept a bearer token directly; the
  # one-click Claude.ai / ChatGPT connector UIs expect OAuth 2.1 (a later step).
  # See docs/http-exposure.md.

# Cortex can be the only MCP endpoint an AI receives. Registered upstream MCP
# tools are namespaced (<server>.<tool>), filtered per user/group, rechecked on
# every call, and audited without argument values. Upstream credentials are env
# var NAMES in the database—not secret values.
gateway:
  enabled: true
  allow_user_servers: false
  allow_stdio_servers: false
  # Exact, resolved executable paths only. Never allowlist shells, generic
  # interpreters, package managers, env, or uvx.
  stdio_allowed_executables: []
  # Optional cwd must resolve beneath one of these operator-managed roots.
  stdio_allowed_workdirs: []
  block_private_networks: true
  # Strongly recommended for internet-reachable installs. Globs match hosts.
  outbound_allowlist: []       # e.g. ["mcp.example.com", "*.trusted.example"]
  timeout_seconds: 20
  max_concurrency: 16
  audit_retention_days: 90
  # Safe defaults: Cortex reads visible; writes and external tools need grants.
  default_read_allow: true
  default_write_allow: false

llm:
  # Powers the semantic_search tool (and later the janitor). Ships disabled so
  # Cortex runs with no API key. To enable, the simplest path is OpenRouter —
  # one key, many models. Set provider: openrouter and CORTEX_LLM_API_KEY:
  #
  #   provider: openrouter
  #   api_key_env: CORTEX_LLM_API_KEY
  #   # model + base_url default automatically for openrouter:
  #   #   model: anthropic/claude-sonnet-4.6   (latest Claude Sonnet; the default)
  #   #   base_url: https://openrouter.ai/api/v1
  #   # For the always-newest Sonnet instead of a pinned version:
  #   #   model: "~anthropic/claude-sonnet-latest"
  #   options: { max_tokens: 1500 }           # synthesis answer length
  #
  # Other providers: openai (needs model), ollama (local, no key, needs model),
  # anthropic (needs the 'anthropic' extra; model defaults to claude-sonnet-4-6).
  provider: none               # none | openrouter | openai | anthropic | ollama

writes:
  # Single global switch for the mutating MCP tools (write_note, patch_note,
  # append_note, update_frontmatter, delete_note — yes, delete too). Default
  # false: Cortex is a public "anyone can spin one up" project, so
  # destructive-by-default would be a footgun. Flip this on only once you're
  # ready to let a connected agent write into your vault.
  #
  # Every mutation — including delete — is still exactly one git commit
  # (actor + reason), so nothing is ever truly destroyed: a bad write or
  # delete is always recoverable with `git revert` or `git show <sha>:<path>`.
  # User/group tool policy is configured in the admin panel. This global switch
  # still removes all mutating Cortex tools when false.
  enabled: false

# LDAP / Active Directory integration (optional — the feature is fully OFF
# while this block is absent). Requires the 'ldap' extra:
#   pip install 'cortex-memory[ldap]'
#
# When configured, a login for an LDAP-backed (or unknown) username is
# verified by binding against the directory (search-then-bind); local users
# always keep local password auth. LDAP users are rows with
# auth_source=ldap and NO local password material — Cortex never stores or
# logs directory passwords. The service-account password comes from the env
# var named by bind_password_env, never from this file. If the directory is
# unreachable, LDAP users simply can't start new sessions; local logins
# (including the local admin) are unaffected.
#
# ldap:
#   server_uri: ldaps://ad.example.com:636    # or ldap://... with starttls
#   starttls: false              # upgrade a plain ldap:// URI to TLS
#   # allow_insecure: true       # lab-only escape hatch; binds carry passwords
#   bind_dn: CN=cortex-svc,OU=Service Accounts,DC=example,DC=com
#   bind_password_env: CORTEX_LDAP_BIND_PASSWORD   # env var NAME, not the secret
#   user_base_dn: OU=People,DC=example,DC=com
#   # {username} is substituted with the RFC 4515-escaped login name:
#   user_filter: "(sAMAccountName={username})"
#   attributes:                  # directory attribute -> Cortex user field
#     username: sAMAccountName   # OpenLDAP: uid
#     display_name: displayName  # OpenLDAP: cn
#     email: mail
#   group_base_dn: OU=Groups,DC=example,DC=com
#   group_filter: "(objectClass=group)"        # OpenLDAP: (objectClass=groupOfNames)
#   group_member_attr: member                  # one level deep — no nested groups
#   # LDAP group (DN, or its name/cn) -> Cortex group. Only mapped groups are
#   # reconciled; local-only Cortex groups are never touched by LDAP.
#   group_mappings:
#     "CN=Engineering,OU=Groups,DC=example,DC=com": engineering
#     "CN=Ops,OU=Groups,DC=example,DC=com": ops
#   # Create the Cortex user row on first successful directory login. When
#   # false, only users pre-created by `cortex ldap sync` may log in.
#   jit_provisioning: true

janitor:
  enabled: false               # dark by default — keep it off until spec'd
  dry_run: true                # current worker is report-only
  interval_seconds: 3600
  allowed_paths: []            # paths the janitor may inspect (when enabled)
  forbidden_paths: []          # always-off paths (in addition to hard categories)
